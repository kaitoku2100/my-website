        const YEARS = Array.from(new Set(QUIZ_DATA.map(d => d.year))).sort((a, b) => b - a);

        const Icon = ({ name, size = 24, className = "" }) => {

                trash: `<path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>`,
                save: `<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>`,

        function App() {
            const [view, setView] = useState('menu');
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [history, setHistory] = useState([]);
            const [selectedYear, setSelectedYear] = useState('all');
            const [isRandom, setIsRandom] = useState(false);
            const [stats, setStats] = useState({});
            const [showClearConfirm, setShowClearConfirm] = useState(false);
            const [settings, setSettings] = useState({ bgColor: '#f8fafc', textColor: '#1e293b', fontSize: 18 });

            // データの読み込み
            useEffect(() => {
                const saved = localStorage.getItem('reha_quiz_storage');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.settings) setSettings(prev => ({ ...prev, ...parsed.settings }));
                    if (parsed.stats) setStats(parsed.stats);
                }
            }, []);

            // データの保存
            const saveCurrentState = (overrides = {}) => {
                const currentState = { view, questions, currentIndex, history, selectedYear, isRandom, settings, stats, ...overrides };
                localStorage.setItem('reha_quiz_storage', JSON.stringify(currentState));
            };

            const resumeSession = () => {
                const saved = localStorage.getItem('reha_quiz_storage');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.questions && parsed.questions.length > 0) {
                        setQuestions(parsed.questions);
                        setCurrentIndex(parsed.currentIndex);
                        setHistory(parsed.history);
                        setSelectedYear(parsed.selectedYear);
                        setIsRandom(parsed.isRandom);
                        setView('quiz');
                    }
                }
            };

            const clearAllHistory = () => {
                localStorage.removeItem('reha_quiz_storage');
                setStats({});
                setHistory([]);
                setQuestions([]);
                setCurrentIndex(0);
                setShowClearConfirm(false);
                const resetState = { settings, stats: {} };
                localStorage.setItem('reha_quiz_storage', JSON.stringify(resetState));
            };

            const weakQuestions = useMemo(() => {
                return QUIZ_DATA.filter(q => {
                    const s = stats[q.id];
                    if (!s) return false;
                    const rate = s.corrects / s.attempts;
                    return rate < 0.8 || (s.attempts > 0 && s.corrects < s.attempts);
                });
            }, [stats]);

            const startQuiz = (mode, random) => {
                let filtered = mode === 'weak' ? [...weakQuestions] : (mode === 'all' ? [...QUIZ_DATA] : QUIZ_DATA.filter(q => q.year === parseInt(mode)));
                if (filtered.length === 0) return;
                if (random) filtered = filtered.sort(() => Math.random() - 0.5);
                else filtered = filtered.sort((a, b) => a.year !== b.year ? a.year - b.year : a.num - b.num);

                setQuestions(filtered);
                setCurrentIndex(0);
                setHistory([]);
                setSelectedYear(mode);
                setIsRandom(random);
                setView('quiz');
                saveCurrentState({ questions: filtered, currentIndex: 0, history: [], selectedYear: mode, isRandom: random, view: 'quiz' });
            };

            const handleAnswer = (optionIdx) => {
                const currentQ = questions[currentIndex];
                const isCorrect = currentQ.answer === optionIdx;
                const newHistory = [...history];
                newHistory[currentIndex] = { id: currentQ.id, selected: optionIdx, isCorrect };
                setHistory(newHistory);
                const newStats = { ...stats };
                if (!newStats[currentQ.id]) newStats[currentQ.id] = { attempts: 0, corrects: 0 };
                newStats[currentQ.id].attempts += 1;
                if (isCorrect) newStats[currentQ.id].corrects += 1;
                setStats(newStats);
                saveCurrentState({ history: newHistory, stats: newStats });
            };

            const goToNext = () => {
                if (currentIndex < questions.length - 1) {
                    const nextIdx = currentIndex + 1;
                    setCurrentIndex(nextIdx);
                    saveCurrentState({ currentIndex: nextIdx });
                } else {
                    setView('result');
                    saveCurrentState();
                }
            };

            const prevQuestion = () => {
                if (currentIndex > 0) {
                    const nextIdx = currentIndex - 1;
                    setCurrentIndex(nextIdx);
                    saveCurrentState({ currentIndex: nextIdx });
                }
            };

            const BACKGROUND_COLORS = ['#f8fafc', '#ffffff', '#fff7ed', '#f0fdf4', '#0f172a', '#1e293b'];
            const TEXT_COLORS = ['#1e293b', '#000000', '#431407', '#064e3b', '#f8fafc', '#ffffff', '#3b82f6', '#ef4444'];
            const isDarkBg = settings.bgColor === '#0f172a' || settings.bgColor === '#1e293b';
            const dynamicStyle = { backgroundColor: settings.bgColor, color: settings.textColor, fontSize: `${settings.fontSize}px` };
            const surfaceStyle = { backgroundColor: isDarkBg ? 'rgba(255,255,255,0.05)' : '#ffffff', borderColor: isDarkBg ? 'rgba(255,255,255,0.1)' : '#f1f5f9' };

            return (
                <div className="min-h-screen font-sans select-none touch-manipulation transition-colors duration-300" style={dynamicStyle}>
                    {view === 'menu' && (
                        <div className="flex flex-col items-center justify-center min-h-screen p-6 space-y-6 animate-in">
                            <div className="text-center">
                                <h1 className="text-3xl font-bold mb-2">リハビリテーション医学</h1>
                                <p className="opacity-50 font-medium">国家試験 過去問自習ツール 完全版</p>
                            </div>
                            <div className="w-full max-w-md space-y-4">
                                <div className="p-6 rounded-3xl shadow-lg border space-y-4" style={{...surfaceStyle, backgroundColor: isDarkBg ? 'rgba(255,165,0,0.1)' : '#fffaf0', borderColor: 'rgba(255,165,0,0.2)'}}>
                                    <div className="flex items-center justify-between">
                                        <label className="text-sm font-bold text-orange-600 uppercase tracking-wider flex items-center gap-2"><Icon name="brain" size={18} /> 苦手克服モード</label>
                                        <span className="bg-orange-200 text-orange-800 px-3 py-1 rounded-full text-xs font-bold">{weakQuestions.length} 問 該当</span>
                                    </div>
                                    <button onClick={() => startQuiz('weak', true)} disabled={weakQuestions.length === 0} className="w-full py-5 bg-orange-500 text-white rounded-2xl font-black text-lg shadow-lg active:scale-95 disabled:opacity-50 flex items-center justify-center space-x-3"><Icon name="play" size={24} /> <span>苦手な問題を学習</span></button>
                                </div>
                                <div className="p-6 rounded-3xl shadow-xl border" style={surfaceStyle}>
                                    <label className="block text-sm font-bold mb-3 opacity-40 uppercase tracking-wider">出題範囲</label>
                                    <select className="w-full p-4 rounded-2xl border-2 mb-6 font-bold" style={{...surfaceStyle, color: settings.textColor}} value={selectedYear} onChange={(e) => setSelectedYear(e.target.value)}>
                                        <option value="all">すべての過去問（全{QUIZ_DATA.length}問）</option>
                                        {YEARS.map(y => <option key={y} value={y}>第{y}回 国家試験 ({QUIZ_DATA.filter(q => q.year === y).length}問)</option>)}
                                    </select>
                                    <div className="flex items-center space-x-3 mb-8 p-4 rounded-2xl border" style={surfaceStyle}>
                                        <input type="checkbox" id="random" checked={isRandom} onChange={(e) => setIsRandom(e.target.checked)} className="w-6 h-6 rounded-lg accent-blue-600" />
                                        <label htmlFor="random" className="font-bold cursor-pointer opacity-80">問題をシャッフルして出題</label>
                                    </div>
                                    <button onClick={() => startQuiz(selectedYear, isRandom)} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-lg active:scale-95 flex items-center justify-center space-x-3"><Icon name="play" size={24} /> <span>学習を開始</span></button>
                                </div>
                                <div className="grid grid-cols-1 gap-3">
                                    {localStorage.getItem('reha_quiz_storage') && JSON.parse(localStorage.getItem('reha_quiz_storage')).questions?.length > 0 && (
                                        <button onClick={resumeSession} className="w-full py-4 bg-emerald-500/10 text-emerald-600 border-2 border-emerald-500/20 rounded-2xl font-bold flex items-center justify-center space-x-2 active:scale-95"><Icon name="rotate" size={20} /> <span>続きから再開</span></button>
                                    )}
                                    <button onClick={() => setView('settings')} className="w-full py-4 bg-slate-500/10 text-slate-500 border-2 border-slate-500/10 rounded-2xl font-bold flex items-center justify-center space-x-2"><Icon name="settings" size={20} /> <span>表示設定・データ管理</span></button>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'quiz' && (
                        <div className="flex flex-col min-h-screen p-4 max-w-2xl mx-auto overflow-hidden">
                            <div className="flex items-center justify-between mb-6 pb-3 border-b-2" style={{borderColor: surfaceStyle.borderColor}}>
                                <button onClick={() => setView('menu')} className="p-2 hover:bg-black/5 rounded-xl"><Icon name="home" size={24} /></button>
                                <div className="text-center"><span className="text-xs font-black opacity-30 uppercase tracking-widest block">Question</span><span className="font-black text-xl">問{questions[currentIndex].num}</span></div>
                                <div className="px-3 py-1 rounded-full text-xs font-mono font-bold" style={surfaceStyle}>{currentIndex + 1} / {questions.length}</div>
                            </div>
                            <div className="flex-1 overflow-y-auto px-1">
                                <div className="mb-8 leading-relaxed font-bold" style={{ fontSize: `${settings.fontSize * 1.25}px` }}>{questions[currentIndex].question}<span className="inline-block ml-3 px-2 py-0.5 bg-black/10 rounded text-sm opacity-70 font-normal">第{questions[currentIndex].year}回</span></div>
                                
                                {history[currentIndex] && (
                                    <div className={`p-4 mb-6 rounded-2xl border-2 font-black text-center animate-in ${history[currentIndex].isCorrect ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : 'bg-rose-50 border-rose-500 text-rose-700'}`}>
                                        <div className="flex items-center justify-center gap-2"><Icon name={history[currentIndex].isCorrect ? 'check' : 'x'} size={24} /><span>{history[currentIndex].isCorrect ? '正解です！' : `不正解です（正解は ${questions[currentIndex].answer + 1}）`}</span></div>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 gap-4 mb-10">
                                    {questions[currentIndex].options.map((opt, idx) => {
                                        const currentHist = history[currentIndex];
                                        const isAnswered = !!currentHist;
                                        const isSelected = isAnswered && currentHist.selected === idx;
                                        const isCorrect = idx === questions[currentIndex].answer;
                                        let btnBaseStyle = { ...surfaceStyle };
                                        let optionTextColor = settings.textColor;
                                        if (isAnswered) {
                                            if (isCorrect) { btnBaseStyle = { backgroundColor: 'rgba(34, 197, 94, 0.15)', borderColor: '#22c55e', borderWidth: '3px' }; optionTextColor = isDarkBg ? '#4ade80' : '#166534'; }
                                            else if (isSelected) { btnBaseStyle = { backgroundColor: 'rgba(239, 68, 68, 0.15)', borderColor: '#ef4444', borderWidth: '3px' }; optionTextColor = isDarkBg ? '#f87171' : '#991b1b'; }
                                            else { btnBaseStyle = { opacity: 0.2, backgroundColor: 'transparent', borderColor: 'transparent' }; }
                                        }
                                        return (
                                            <button key={idx} onClick={() => !isAnswered && handleAnswer(idx)} className="w-full p-6 text-left rounded-3xl border-2 shadow-sm transition-all active:scale-[0.98] flex items-center justify-between" style={{...btnBaseStyle, color: optionTextColor}}><span className="font-bold"><span className="mr-4 opacity-30 font-mono">{idx + 1}</span>{opt}</span>{isAnswered && isCorrect && <Icon name="check" className="text-emerald-500" />}{isAnswered && isSelected && !isCorrect && <Icon name="x" className="text-rose-500" />}</button>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className="flex justify-between items-center mt-4 p-4 bg-white/5 backdrop-blur rounded-3xl border-t" style={{borderColor: surfaceStyle.borderColor}}>
                                <button onClick={prevQuestion} disabled={currentIndex === 0} className="p-4 bg-black/5 rounded-2xl flex items-center space-x-2 disabled:opacity-20 font-bold"><Icon name="left" /> <span>戻る</span></button>
                                <button onClick={goToNext} className={`px-8 py-4 rounded-2xl font-black shadow-lg flex items-center space-x-2 active:scale-95 transition-all ${history[currentIndex] ? 'bg-blue-600 text-white scale-105' : 'bg-slate-300 text-slate-500 opacity-50'}`}><span>{currentIndex === questions.length - 1 ? '結果表示' : '次の問題へ'}</span><Icon name="right" /></button>
                            </div>
                        </div>
                    )}

                    {view === 'result' && (
                        <div className="flex flex-col items-center justify-center min-h-screen p-6 text-center space-y-10 animate-in">
                            <h2 className="text-4xl font-black">学習終了</h2>
                            <div className="relative">
                                <svg className="w-64 h-64"><circle cx="128" cy="128" r="110" fill="none" stroke="currentColor" strokeOpacity="0.1" strokeWidth="16" /><circle cx="128" cy="128" r="110" fill="none" stroke="#3b82f6" strokeWidth="16" strokeDasharray="691" strokeDashoffset={691 - (691 * (history.filter(h => h && h.isCorrect).length / questions.length))} strokeLinecap="round" className="transition-all duration-1000" /></svg>
                                <div className="absolute inset-0 flex flex-col items-center justify-center"><span className="text-6xl font-black text-blue-600">{Math.round((history.filter(h => h && h.isCorrect).length / questions.length) * 100)}%</span><span className="text-slate-400 font-bold">{history.filter(h => h && h.isCorrect).length} / {questions.length} 正解</span></div>
                            </div>
                            <div className="w-full max-w-sm grid grid-cols-2 gap-4">
                                <button onClick={() => startQuiz(selectedYear, isRandom)} className="py-4 bg-black/5 rounded-2xl font-bold active:scale-95">もう一度解く</button>
                                <button onClick={() => setView('menu')} className="py-4 bg-blue-600 text-white rounded-2xl font-bold active:scale-95">メニューへ</button>
                            </div>
                        </div>
                    )}

                    {view === 'settings' && (
                        <div className="min-h-screen p-6 max-w-md mx-auto space-y-8 pb-10">
                            <div className="flex items-center space-x-4"><button onClick={() => { setView('menu'); setShowClearConfirm(false); }} className="p-3 bg-black/5 rounded-2xl"><Icon name="left" size={28}/></button><h2 className="text-2xl font-black">設定・データ管理</h2></div>
                            <div className="space-y-6">
                                <div className="p-6 rounded-3xl shadow-sm border space-y-4" style={surfaceStyle}><label className="block font-black opacity-40 text-xs uppercase tracking-widest">背景色</label>
                                    <div className="grid grid-cols-6 gap-2">{BACKGROUND_COLORS.map(color => (<button key={color} onClick={() => setSettings({...settings, bgColor: color})} className={`h-10 rounded-xl border-4 transition-all ${settings.bgColor === color ? 'border-blue-500 scale-110' : 'border-black/5'}`} style={{backgroundColor: color}} />))}</div>
                                </div>
                                <div className="p-6 rounded-3xl shadow-sm border space-y-4" style={surfaceStyle}><label className="block font-black opacity-40 text-xs uppercase tracking-widest">文字色</label>
                                    <div className="grid grid-cols-8 gap-2">{TEXT_COLORS.map(color => (<button key={color} onClick={() => setSettings({...settings, textColor: color})} className={`h-10 rounded-xl border-4 transition-all ${settings.textColor === color ? 'border-blue-500 scale-110' : 'border-black/5'}`} style={{backgroundColor: color}} />))}</div>
                                </div>
                                <div className="p-6 rounded-3xl shadow-sm border space-y-4" style={surfaceStyle}><label className="block font-black opacity-40 text-xs uppercase tracking-widest">文字サイズ ({settings.fontSize}px)</label><input type="range" min="14" max="32" value={settings.fontSize} onChange={(e) => setSettings({...settings, fontSize: parseInt(e.target.value)})} className="w-full h-3 accent-blue-600" />
                                    <div className="p-4 rounded-xl border-2 border-dashed text-center font-bold" style={{fontSize: `${settings.fontSize}px`, color: settings.textColor, backgroundColor: settings.bgColor}}>テキストプレビュー</div>
                                </div>
                                <div className="p-6 rounded-3xl shadow-sm border space-y-4" style={surfaceStyle}><label className="block font-black opacity-40 text-xs uppercase tracking-widest">データの管理</label>
                                    {!showClearConfirm ? (<button onClick={() => setShowClearConfirm(true)} className="w-full py-4 bg-rose-500/10 text-rose-500 border-2 border-rose-500/10 rounded-2xl font-bold flex items-center justify-center space-x-2"><Icon name="trash" size={20} /><span>履歴と統計をクリア</span></button>) : (
                                        <div className="bg-rose-500/10 p-4 rounded-2xl border-2 border-rose-500/20 space-y-4"><div className="flex items-start space-x-3 text-rose-500"><Icon name="alert" className="mt-1" /><p className="text-sm font-bold">全ての正解率・履歴が消去されます。よろしいですか？</p></div><div className="flex gap-2"><button onClick={() => setShowClearConfirm(false)} className="flex-1 py-3 bg-white/10 text-inherit rounded-xl font-bold border border-black/10">やめる</button><button onClick={clearAllHistory} className="flex-1 py-3 bg-rose-600 text-white rounded-xl font-bold">消去を実行</button></div></div>
                                    )}
                                </div>
                                <button onClick={() => { saveCurrentState(); setView('menu'); }} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-lg shadow-lg flex items-center justify-center space-x-2"><Icon name="save" size={24} /><span>設定を保存して戻る</span></button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
